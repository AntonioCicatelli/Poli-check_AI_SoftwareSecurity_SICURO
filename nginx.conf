worker_processes 1;

events { worker_connections 1024; }

http {
    # Crea una zona di memoria chiamata 'frontend_limit' per tracciare gli IP
    # Consente un massimo di 5 richieste al secondo per ogni indirizzo IP
    limit_req_zone $binary_remote_addr zone=frontend_limit:10m rate=20r/s;

    server {
        listen 80; # Nginx ascolta sulla porta standard HTTP

        location / {
            # Applica la regola anti-DoS definita sopra
            # burst=10 permette piccoli picchi improvvisi senza bloccare subito
            limit_req zone=frontend_limit burst=50 nodelay;

            # Inoltra il traffico "pulito" al container del frontend sulla porta 8501
            proxy_pass http://dashboard:8501;
            
            # Intestazioni standard per mantenere l'IP originale dell'utente
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Configurazioni obbligatorie per far funzionare i WebSocket di Streamlit
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";


	    #Aggiunta timeout per non far cadere la connessione tra la richiesta e la dashboard
	    proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 3600s;

        }
    }
}